<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 Clinique MedicalApp - Gestion RDV</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏥 Clinique MedicalApp</h1>
            <p>Gestion complète des rendez-vous médicaux</p>
        </header>
        
        <div id="login-section">
            <div class="form-card">
                <h2>🔐 Connexion</h2>
                <form id="loginForm">
                    <input type="text" id="username" placeholder="Nom d'utilisateur" required>
                    <input type="password" id="password" placeholder="Mot de passe" required>
                    <select id="role">
                        <option value="admin">🛠 Administrateur</option>
                        <option value="doctor">👨‍⚕️ Médecin</option>
                        <option value="patient">👤 Patient</option>
                    </select>
                    <button type="submit">Se connecter</button>
                </form>
                <p>Pas de compte? <a href="#" id="showRegister">S'inscrire</a></p>
            </div>
        </div>

        <div id="register-section" style="display: none;">
            <div class="form-card">
                <h2>📝 Inscription</h2>
                <form id="registerForm">
                    <input type="text" id="regUsername" placeholder="Nom d'utilisateur" required>
                    <input type="email" id="regEmail" placeholder="Email" required>
                    <input type="password" id="regPassword" placeholder="Mot de passe (min 6)" required>
                    <select id="regRole">
                        <option value="patient">👤 Patient</option>
                        <option value="doctor">👨‍⚕️ Médecin</option>
                    </select>
                    <button type="submit">S'inscrire</button>
                </form>
                <p>Déjà inscrit? <a href="#" id="showLogin">Se connecter</a></p>
            </div>
        </div>

        <div id="dashboard" style="display: none;">
            <nav class="top-nav">
                <span id="welcome-user"></span>
                <button id="logoutBtn">🚪 Déconnexion</button>
            </nav>
            <div id="dashboard-content">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>
    
    <script src="js/app.js"></script>
</body>
</html>
